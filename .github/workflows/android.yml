name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-debug:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Decode Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 -d -i debug.keystore.base64 > debug.keystore
        else
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    - name: Build Debug APK
      run: gradle :app:assembleDebug
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

  build-release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Decode Release Keystore
      run: |
        if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > my-upload-key.jks
        fi
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    - name: Build Release APK
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
      run: gradle :app:assembleRelease
    - name: Rename APK
      run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/secure-dialer-${{ github.event.inputs.release_version }}.apk
    - name: Extract Release Notes
      run: |
        # Extract the latest entry from CHANGELOG.md (everything between the first and second H2 headers)
        sed -n '/## \[/,/## \[/p' CHANGELOG.md | sed '1d;$d' > release_notes.md
        if [ ! -s release_notes.md ]; then
          # Fallback if extraction fails or it's the first entry
          grep -A 1000 "## \[" CHANGELOG.md | sed '1d' > release_notes.md
        fi
    - name: Create Release and Upload
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.release_version }}
        name: Release ${{ github.event.inputs.release_version }}
        body_path: release_notes.md
        generate_release_notes: false
        files: app/build/outputs/apk/release/secure-dialer-${{ github.event.inputs.release_version }}.apk

